version: '3.8'

services:
  # ── Web application ─────────────────────────────────────────────────────────
  # Entrypoint: avval "prisma migrate deploy" ishlatadi, so'ng "node server.js"
  web:
    build: .
    expose:
      - "3000"
    environment:
      DATABASE_URL: file:/data/backlink.db
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      # OPENPAGERANK_API_KEY: ""
    volumes:
      - db_data:/data
    command: ["node", "server.js"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Background worker ────────────────────────────────────────────────────────
  # Entrypoint migration ham ishlatadi (idempotent — xavfsiz)
  worker:
    build: .
    environment:
      DATABASE_URL: file:/data/backlink.db
      NODE_ENV: production
      WORKER_CRAWL_CONCURRENCY: "3"
      WORKER_DOMAIN_CHECK_CONCURRENCY: "10"
      WORKER_POLL_INTERVAL_MS: "2000"
      CRAWLER_MAX_DEPTH: "5"
      CRAWLER_MAX_PAGES_PER_SITE: "500"
      CRAWLER_PAGE_CONCURRENCY: "5"
      CRAWLER_REQUEST_TIMEOUT_MS: "15000"
      CRAWLER_RATE_LIMIT_MS: "500"
      # OPENPAGERANK_API_KEY: ""
    volumes:
      - db_data:/data
    command: ["node", "dist/worker/index.js"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

volumes:
  db_data:
    driver: local
