version: '3.8'

services:
  # ── Web application ─────────────────────────────────────────────────────────
  # sh -c: avval prisma migrate, so'ng Next.js server
  web:
    build: .
    expose:
      - "3000"
    environment:
      DATABASE_URL: file:/data/backlink.db
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - db_data:/data
    # Exec-array: YAML `>` fold Coolify/docker-compose'da noto'g'ri bo'lishi mumkin; wget alpine'da yo'q bo'lishi mumkin
    command:
      - /bin/sh
      - -c
      - node /app/node_modules/prisma/build/index.js migrate deploy && exec node server.js
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/stats',{signal:AbortSignal.timeout(9000)}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Background worker ────────────────────────────────────────────────────────
  # Web healthy bo'lgandan keyin boshlanadi
  worker:
    build: .
    environment:
      DATABASE_URL: file:/data/backlink.db
      NODE_ENV: production
      WORKER_CRAWL_CONCURRENCY: "3"
      WORKER_DOMAIN_CHECK_CONCURRENCY: "10"
      WORKER_POLL_INTERVAL_MS: "2000"
      CRAWLER_MAX_DEPTH: "20"
      CRAWLER_MAX_PAGES_PER_SITE: "2147483647"
      CRAWLER_PAGE_CONCURRENCY: "5"
      CRAWLER_REQUEST_TIMEOUT_MS: "15000"
      CRAWLER_RATE_LIMIT_MS: "500"
    volumes:
      - db_data:/data
    command: ["node", "dist/worker/index.js"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

volumes:
  db_data:
    driver: local
